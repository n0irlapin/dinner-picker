<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 메뉴 추천</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      background: #fff;
      border-radius: 20px;
      padding: 2rem;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.75rem; color: #111; }
    .section-label { font-size: 13px; color: #888; font-weight: 500; margin-bottom: 10px; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.5rem; }
    .mood-btn {
      cursor: pointer; padding: 9px 15px; border-radius: 10px;
      border: 1.5px solid #e0e0e0; background: #fff; color: #333;
      font-size: 14px; transition: all 0.15s;
    }
    .mood-btn:hover { background: #f5f5f5; border-color: #ccc; }
    .mood-btn.selected {
      border: 2px solid #378add; background: #e6f1fb;
      color: #185fa5; font-weight: 500;
    }
    .budget-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
    input[type=range] { flex: 1; accent-color: #378add; height: 4px; }
    .budget-val { font-size: 14px; font-weight: 500; min-width: 90px; color: #333; }
    .pick-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: #1a1a1a; color: #fff; font-size: 16px; font-weight: 500;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .pick-btn:hover { background: #333; }
    .pick-btn:active { transform: scale(0.98); }
    .result-card {
      margin-top: 1.5rem; background: #fafafa; border: 1px solid #eee;
      border-radius: 16px; padding: 1.25rem; animation: popIn 0.25s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .result-header { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .result-emoji { font-size: 42px; }
    .result-name { font-size: 20px; font-weight: 600; color: #111; }
    .result-meta { font-size: 13px; color: #999; margin-top: 3px; }
    .result-notice { font-size: 12px; color: #aaa; margin-top: 2px; }
    .result-desc { font-size: 14px; color: #555; line-height: 1.65; margin-bottom: 12px; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
    .action-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .action-btn {
      padding: 9px 18px; border-radius: 10px; border: 1.5px solid #e0e0e0;
      background: #fff; font-size: 13px; cursor: pointer; transition: background 0.12s;
    }
    .action-btn:hover { background: #f5f5f5; }
  </style>
</head>

const budgetLabels = ["1만원 이하","1~2만원","2~3만원","3만원 이상"];
const tagColors = [
  {bg:"#e6f1fb",text:"#185fa5"},{bg:"#eaf3de",text:"#3b6d11"},
  {bg:"#faeeda",text:"#854f0b"},{bg:"#fbeaf0",text:"#993556"},{bg:"#e1f5ee",text:"#0f6e56"}
];
let selectedMood = null, selectedCuisine = null, selectedBudget = 1;

document.getElementById('budget-slider').addEventListener('input', function() {
  selectedBudget = parseInt(this.value);
  document.getElementById('budget-label').textContent = budgetLabels[selectedBudget];
});

document.querySelectorAll('#mood-btns .mood-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#mood-btns .mood-btn').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    selectedMood = this.dataset.mood;
  });
});

document.querySelectorAll('#cuisine-btns .mood-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('#cuisine-btns .mood-btn').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    selectedCuisine = this.dataset.cuisine;
  });
});

function pickMenu() {
  const cuisineOk = m => !selectedCuisine || selectedCuisine === '상관없음' || m.cuisine === selectedCuisine;
  const moodOk    = m => !selectedMood || m.mood.includes(selectedMood);
  const budgetOk  = m => m.budget.includes(selectedBudget);

  // 1단계: 모든 조건 충족
  let pool = menus.filter(m => cuisineOk(m) && moodOk(m) && budgetOk(m));

  // 2단계: 예산 제외 (카테고리 + 기분 유지)
  let notice = '';
  if (pool.length === 0) {
    pool = menus.filter(m => cuisineOk(m) && moodOk(m));
    notice = '예산 조건에 맞는 메뉴가 없어서 비슷한 걸 골라봤어요';
  }

  // 3단계: 기분 제외 (카테고리만 유지)
  if (pool.length === 0) {
    pool = menus.filter(m => cuisineOk(m));
    notice = '딱 맞는 메뉴가 없어서 같은 카테고리에서 골라봤어요';
  }

  // 4단계: 전체 (그래도 없으면)
  if (pool.length === 0) {
    pool = menus;
    notice = '조건에 맞는 메뉴가 없어서 전체에서 골라봤어요';
  }

  const pick = pool[Math.floor(Math.random() * pool.length)];

  const tagsHtml = pick.tags.map((t, i) => {
    const c = tagColors[i % tagColors.length];
    return `<span class="tag" style="background:${c.bg};color:${c.text}">${t}</span>`;
  }).join('');

  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="result-emoji">${pick.emoji}</span>
        <div>
          <div class="result-name">${pick.name}</div>
          <div class="result-meta">${pick.cuisine} · ${pick.kcal}</div>
          ${notice ? `<div class="result-notice">* ${notice}</div>` : ''}
        </div>
      </div>
      <p class="result-desc">${pick.desc}</p>
      <div class="tags">${tagsHtml}</div>
      <div class="action-row">
        <button class="action-btn" onclick="pickMenu()">다시 골라줘 🔄</button>
      </div>
    </div>
  `;
}
</script>
